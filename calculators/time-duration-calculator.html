<h1>Time Duration Calculator</h1><p>Calculate the difference between two times.</p><label>Start Time</label>
<br/>
<input id="start" type="time"/>
<br/><br/>
<label>End Time</label>
<br/>
<input id="end" type="time"/>
<br/><br/>
<button onclick="calcTime()">Calculate</button>
<br/><br/>
<div id="result"></div><ul><li><strong>Duration (Hours):</strong> <span id="hours"></span></li><li><strong>Duration (Minutes):</strong> <span id="minutes"></span></li></ul><table><tr>
<th>Start Time</th>
<th>End Time</th>
<th>Duration</th>
</tr><tbody id="table"></tbody></table><script>

function calcTime(){

let start=document.getElementById("start").value

let end=document.getElementById("end").value

let startTime=new Date("1970-01-01T"+start)

let endTime=new Date("1970-01-01T"+end)

let diff=(endTime-startTime)/1000/60

let hours=Math.floor(diff/60)

let minutes=diff%60

document.getElementById("hours").innerHTML=hours+" hours "+minutes+" minutes"

document.getElementById("minutes").innerHTML=diff+" minutes"

document.getElementById("result").innerHTML=
"Total duration: "+hours+"h "+minutes+"m"

let table="<tr><td>"+start+"</td><td>"+end+"</td><td>"+hours+"h "+minutes+"m</td></tr>"

document.getElementById("table").innerHTML=table

}
