<h1>Simple Interest Calculator</h1><p>Calculate simple interest and total amount.</p><label>Principal Amount</label>
<br/>
<input id="principal" type="number"/>
<br/><br/>
<label>Interest Rate (%)</label>
<br/>
<input id="rate" type="number"/>
<br/><br/>
<label>Time (Years)</label>
<br/>
<input id="time" type="number"/>
<br/><br/>
<button onclick="calculateSI()">Calculate</button>
<br/><br/>
<div id="result"></div><ul><li><strong>Simple Interest:</strong> <span id="interest"></span></li><li><strong>Total Amount:</strong> <span id="total"></span></li><li><strong>Monthly Interest:</strong> <span id="monthly"></span></li></ul><table><tr>
<th>Year</th>
<th>Interest Earned</th>
</tr><tbody id="table"></tbody></table><script>

function calculateSI(){

let p=parseFloat(document.getElementById("principal").value)

let r=parseFloat(document.getElementById("rate").value)

let t=parseFloat(document.getElementById("time").value)

let interest=(p*r*t)/100

let total=p+interest

let monthly=interest/(t*12)

document.getElementById("interest").innerHTML=interest.toFixed(2)

document.getElementById("total").innerHTML=total.toFixed(2)

document.getElementById("monthly").innerHTML=monthly.toFixed(2)

let table=""

for(let i=1;i<=t;i++){

let yearly=(p*r)/100

table+="<tr><td>"+i+"</td><td>"+yearly.toFixed(2)+"</td></tr>"

}

document.getElementById("table").innerHTML=table

}
