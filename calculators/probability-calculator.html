<h1>Probability Calculator</h1><p>Calculate probability of an event.</p><label>Favorable Outcomes</label>
<br/>
<input id="fav" type="number"/>
<br/><br/>
<label>Total Outcomes</label>
<br/>
<input id="total" type="number"/>
<br/><br/>
<button onclick="prob()">Calculate</button>
<p id="result"></p><div class="bar">
<div class="fill" id="bar"></div>
</div><script>

function prob(){

let fav=parseFloat(document.getElementById("fav").value)

let total=parseFloat(document.getElementById("total").value)

let probability=fav/total

let percent=probability*100

document.getElementById("result").innerHTML=
"Probability: "+probability.toFixed(4)+
"<br>Percentage: "+percent.toFixed(2)+"%"+
"<br>Odds: "+fav+" : "+(total-fav)

document.getElementById("bar").style.width=Math.min(percent,100)+"%"

}
