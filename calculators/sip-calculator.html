<h1>SIP Calculator</h1>
<p>Estimate returns from your SIP investment.</p>
<label>Monthly Investment (₹)</label>
<br/>
<input id="investment" type="number"/>
<br/><br/>
<label>Interest Rate (% per year)</label>
<br/>
<input id="rate" type="number"/>
<br/><br/>
<label>Time (Years)</label>
<br/>
<input id="years" type="number"/>
<br/><br/>
<button onclick="calculateSIP()">Calculate SIP</button>
<br/><br/>
<div id="summary"></div>
<div class="bar">
<div class="fill" id="bar"></div>
</div>
<ul>
<li><strong>Total Investment:</strong> <span id="invested"></span></li>
<li><strong>Total Returns:</strong> <span id="returns"></span></li>
<li><strong>Wealth Gained:</strong> <span id="gain"></span></li>
</ul>
<table>
<tr>
<th>Year</th>
<th>Investment</th>
<th>Value</th>
</tr>
<tbody id="table"></tbody>
</table>
<script>
function calculateSIP(){

  let monthly = parseFloat(document.getElementById("investment").value);
  let annualRate = parseFloat(document.getElementById("rate").value);
  let years = parseFloat(document.getElementById("years").value);
  let months = years * 12;

  // ✅ FIXED: Effective monthly rate (same formula as reference app)
  let rate = Math.pow(1 + annualRate / 100, 1/12) - 1;

  let future = monthly * ((Math.pow(1 + rate, months) - 1) / rate) * (1 + rate);
  let invested = monthly * months;
  let gain = future - invested;

  document.getElementById("invested").innerHTML = invested.toFixed(2);
  document.getElementById("returns").innerHTML = future.toFixed(2);
  document.getElementById("gain").innerHTML = gain.toFixed(2);

  document.getElementById("summary").innerHTML =
    "Estimated maturity amount: ₹" + future.toFixed(2);

  let percent = (gain / future) * 100;
  document.getElementById("bar").style.width = percent + "%";

  // ✅ FIXED: Table uses same effective rate formula — matches main result
  let table = "";
  for(let y = 1; y <= years; y++){
    let n = y * 12;
    let yv = monthly * ((Math.pow(1 + rate, n) - 1) / rate) * (1 + rate);
    let yi = monthly * n;
    table += "<tr><td>" + y + "</td><td>" + yi.toFixed(2) + "</td><td>" + yv.toFixed(2) + "</td></tr>";
  }

  document.getElementById("table").innerHTML = table;
}
</script>
