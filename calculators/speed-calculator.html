<h1>Speed Calculator</h1><p>Calculate speed based on distance and time.</p><label>Distance (km)</label>
<br/>
<input id="distance" type="number"/>
<br/><br/>
<label>Time (hours)</label>
<br/>
<input id="time" type="number"/>
<br/><br/>
<button onclick="speed()">Calculate Speed</button>
<br/><br/>
<div id="result"></div><ul><li><strong>Speed (km/h):</strong> <span id="kmh"></span></li><li><strong>Speed (m/s):</strong> <span id="ms"></span></li><li><strong>Speed (mph):</strong> <span id="mph"></span></li></ul><table><tr>
<th>Distance</th>
<th>Time</th>
<th>Speed</th>
</tr><tbody id="table"></tbody></table><script>

function speed(){

let distance=parseFloat(document.getElementById("distance").value)

let time=parseFloat(document.getElementById("time").value)

let kmh=distance/time

let ms=kmh/3.6

let mph=kmh*0.621371

document.getElementById("kmh").innerHTML=kmh.toFixed(2)

document.getElementById("ms").innerHTML=ms.toFixed(2)

document.getElementById("mph").innerHTML=mph.toFixed(2)

document.getElementById("result").innerHTML=
"Average speed is "+kmh.toFixed(2)+" km/h"

let table="<tr><td>"+distance+" km</td><td>"+time+" h</td><td>"+kmh.toFixed(2)+" km/h</td></tr>"

document.getElementById("table").innerHTML=table

}
