<h1>TDEE Calculator</h1><p>Estimate your daily calorie needs.</p><label>Enter your BMR</label>
<br/>
<input id="bmr" type="number"/>
<br/><br/>
<label>Activity Level</label>
<br/>
<select id="activity">
<option value="1.2">Sedentary (little or no exercise)</option><option value="1.375">Light Exercise (1-3 days/week)</option><option value="1.55">Moderate Exercise (3-5 days/week)</option><option value="1.725">Heavy Exercise (6-7 days/week)</option></select><br/><br/>
<button onclick="calcTDEE()">Calculate</button>
<br/><br/>
<div id="result"></div><ul><li><strong>Maintenance Calories:</strong> <span id="maintain"></span></li><li><strong>Weight Loss Calories:</strong> <span id="loss"></span></li><li><strong>Weight Gain Calories:</strong> <span id="gain"></span></li></ul><table><tr>
<th>Goal</th>
<th>Calories Per Day</th>
</tr><tr>
<td>Maintain Weight</td>
<td id="m"></td>
</tr><tr>
<td>Lose Weight</td>
<td id="l"></td>
</tr><tr>
<td>Gain Weight</td>
<td id="g"></td>
</tr></table><script>

function calcTDEE(){

let bmr=parseFloat(document.getElementById("bmr").value)

let activity=parseFloat(document.getElementById("activity").value)

let tdee=bmr*activity

let loss=tdee-500

let gain=tdee+500

document.getElementById("maintain").innerHTML=tdee.toFixed(0)

document.getElementById("loss").innerHTML=loss.toFixed(0)

document.getElementById("gain").innerHTML=gain.toFixed(0)

document.getElementById("m").innerHTML=tdee.toFixed(0)

document.getElementById("l").innerHTML=loss.toFixed(0)

document.getElementById("g").innerHTML=gain.toFixed(0)

document.getElementById("result").innerHTML=
"Estimated daily calorie requirement: "+tdee.toFixed(0)+" kcal"

}
