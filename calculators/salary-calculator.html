<h1>Advanced Salary Calculator</h1><p>Calculate your net salary after tax and PF deductions.</p><label>Annual CTC</label>
<br/>
<input id="ctc" type="number"/>
<br/><br/>
<label>Tax (%)</label>
<br/>
<input id="tax" type="number"/>
<br/><br/>
<label>PF (%)</label>
<br/>
<input id="pf" type="number"/>
<br/><br/>
<button onclick="calculateSalary()">Calculate Salary</button>
<br/><br/>
<div id="summary"></div><div class="bar">
<div class="fill" id="bar"></div>
</div><table><tr>
<th>Salary Component</th>
<th>Amount</th>
</tr><tr>
<td>Annual Net Salary</td>
<td id="annual"></td>
</tr><tr>
<td>Monthly Salary</td>
<td id="monthly"></td>
</tr><tr>
<td>Tax Deduction</td>
<td id="taxAmount"></td>
</tr><tr>
<td>PF Deduction</td>
<td id="pfAmount"></td>
</tr><tr>
<td>Total Take Home</td>
<td id="takehome"></td>
</tr></table><script>

function calculateSalary(){

let ctc=parseFloat(document.getElementById("ctc").value)

let tax=parseFloat(document.getElementById("tax").value)

let pf=parseFloat(document.getElementById("pf").value)

let taxAmount=(ctc*tax)/100

let pfAmount=(ctc*pf)/100

let netAnnual=ctc-taxAmount-pfAmount

let monthly=netAnnual/12

document.getElementById("annual").innerHTML=netAnnual.toFixed(2)

document.getElementById("monthly").innerHTML=monthly.toFixed(2)

document.getElementById("taxAmount").innerHTML=taxAmount.toFixed(2)

document.getElementById("pfAmount").innerHTML=pfAmount.toFixed(2)

document.getElementById("takehome").innerHTML=netAnnual.toFixed(2)

document.getElementById("summary").innerHTML=
"Your monthly take-home salary is "+monthly.toFixed(2)

let percent=(netAnnual/ctc)*100

document.getElementById("bar").style.width=percent+"%"

}

</script><script src="../js/main.js"></script><script type="application/ld+json">
