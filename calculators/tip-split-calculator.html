<h1>Tip Split Calculator</h1><p>Split restaurant bill including tip.</p><label>Bill Amount</label>
<br/>
<input id="bill" type="number"/>
<br/><br/>
<label>Tip (%)</label>
<br/>
<input id="tip" type="number" value="10"/>
<br/><br/>
<label>Number of People</label>
<br/>
<input id="people" type="number"/>
<br/><br/>
<button onclick="split()">Calculate</button>
<br/><br/>
<div id="result"></div><ul><li><strong>Total Tip:</strong> <span id="tipAmount"></span></li><li><strong>Total Bill:</strong> <span id="totalBill"></span></li><li><strong>Per Person:</strong> <span id="perPerson"></span></li></ul><table><tr>
<th>Bill</th>
<th>Tip</th>
<th>People</th>
<th>Per Person</th>
</tr><tbody id="table"></tbody></table><script>

function split(){

let bill=parseFloat(document.getElementById("bill").value)

let tip=parseFloat(document.getElementById("tip").value)

let people=parseFloat(document.getElementById("people").value)

let tipAmount=(bill*tip)/100

let total=bill+tipAmount

let perPerson=total/people

document.getElementById("tipAmount").innerHTML=tipAmount.toFixed(2)

document.getElementById("totalBill").innerHTML=total.toFixed(2)

document.getElementById("perPerson").innerHTML=perPerson.toFixed(2)

document.getElementById("result").innerHTML=
"Each person pays "+perPerson.toFixed(2)

let table="<tr><td>"+bill+"</td><td>"+tipAmount.toFixed(2)+"</td><td>"+people+"</td><td>"+perPerson.toFixed(2)+"</td></tr>"

document.getElementById("table").innerHTML=table

}
