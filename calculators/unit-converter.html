<h1>Length Unit Converter</h1><p>Convert meters into multiple length units.</p><label>Meters</label>
<br/>
<input id="meters" type="number"/>
<br/><br/>
<button onclick="convert()">Convert</button>
<br/><br/>
<div id="result"></div><ul><li><strong>Kilometers:</strong> <span id="km"></span></li><li><strong>Centimeters:</strong> <span id="cm"></span></li><li><strong>Millimeters:</strong> <span id="mm"></span></li><li><strong>Miles:</strong> <span id="mile"></span></li></ul><table><tr>
<th>Unit</th>
<th>Value</th>
</tr><tr>
<td>Kilometers</td>
<td id="km2"></td>
</tr><tr>
<td>Centimeters</td>
<td id="cm2"></td>
</tr><tr>
<td>Millimeters</td>
<td id="mm2"></td>
</tr><tr>
<td>Miles</td>
<td id="mile2"></td>
</tr></table><script>

function convert(){

let meters=parseFloat(document.getElementById("meters").value)

let km=meters/1000

let cm=meters*100

let mm=meters*1000

let mile=meters*0.000621371

document.getElementById("km").innerHTML=km.toFixed(4)

document.getElementById("cm").innerHTML=cm.toFixed(2)

document.getElementById("mm").innerHTML=mm.toFixed(2)

document.getElementById("mile").innerHTML=mile.toFixed(6)

document.getElementById("km2").innerHTML=km.toFixed(4)

document.getElementById("cm2").innerHTML=cm.toFixed(2)

document.getElementById("mm2").innerHTML=mm.toFixed(2)

document.getElementById("mile2").innerHTML=mile.toFixed(6)

document.getElementById("result").innerHTML=
meters+" meters converted to multiple units"

}
