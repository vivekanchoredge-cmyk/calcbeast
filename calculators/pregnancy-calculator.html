<h1>Pregnancy Due Date Calculator</h1><p>Estimate your baby's due date and pregnancy stage.</p><label>First Day of Last Menstrual Period (LMP)</label>
<br/>
<input id="lmp" type="date"/>
<br/><br/>
<button onclick="calcDueDate()">Calculate</button>
<br/><br/>
<div id="result"></div><ul><li><strong>Estimated Due Date:</strong> <span id="due"></span></li><li><strong>Weeks Pregnant:</strong> <span id="weeks"></span></li><li><strong>Trimester:</strong> <span id="trimester"></span></li></ul><script>

function calcDueDate(){

let lmp=new Date(document.getElementById("lmp").value)

let dueDate=new Date(lmp)

dueDate.setDate(lmp.getDate()+280)

let today=new Date()

let diff=today-lmp

let weeks=Math.floor(diff/(1000*60*60*24*7))

let trimester=""

if(weeks<=13) trimester="First Trimester"

else if(weeks<=27) trimester="Second Trimester"

else trimester="Third Trimester"

document.getElementById("due").innerHTML=dueDate.toDateString()

document.getElementById("weeks").innerHTML=weeks+" weeks"

document.getElementById("trimester").innerHTML=trimester

}
