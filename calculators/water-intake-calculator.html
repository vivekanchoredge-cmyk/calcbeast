<h1>Water Intake Calculator</h1><p>Estimate daily water intake based on body weight.</p><label>Weight (kg)</label>
<br/>
<input id="weight" type="number"/>
<br/><br/>
<button onclick="waterCalc()">Calculate</button>
<br/><br/>
<div id="result"></div><ul><li><strong>Water (Liters):</strong> <span id="liters"></span></li><li><strong>Water (Glasses):</strong> <span id="glasses"></span></li></ul><table><tr>
<th>Weight</th>
<th>Recommended Water</th>
</tr><tbody id="table"></tbody></table><script>

function waterCalc(){

let weight=parseFloat(document.getElementById("weight").value)

let liters=weight*0.033

let glasses=liters*4

document.getElementById("liters").innerHTML=liters.toFixed(2)+" L"

document.getElementById("glasses").innerHTML=Math.round(glasses)+" glasses"

document.getElementById("result").innerHTML=
"Recommended daily water intake: "+liters.toFixed(2)+" liters"

let table="<tr><td>"+weight+" kg</td><td>"+liters.toFixed(2)+" L</td></tr>"

document.getElementById("table").innerHTML=table

}
