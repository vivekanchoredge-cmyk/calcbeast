<h1>Ovulation Calculator</h1><p>Predict ovulation date and fertile window.</p><label>First Day of Last Period</label>
<br/>
<input id="cycle" type="date"/>
<br/><br/>
<label>Average Cycle Length (Days)</label>
<br/>
<input id="length" type="number" value="28"/>
<br/><br/>
<button onclick="calcOvulation()">Calculate</button>
<br/><br/>
<div id="result"></div><h2>Results</h2><ul><li><strong>Ovulation Day:</strong> <span id="ovulation"></span></li><li><strong>Fertile Window:</strong> <span id="fertile"></span></li><li><strong>Next Period:</strong> <span id="next"></span></li></ul><script>

function calcOvulation(){

let cycle=new Date(document.getElementById("cycle").value)

let length=parseInt(document.getElementById("length").value)

let ovulation=new Date(cycle)

ovulation.setDate(cycle.getDate()+length-14)

let fertileStart=new Date(ovulation)
fertileStart.setDate(ovulation.getDate()-4)

let fertileEnd=new Date(ovulation)
fertileEnd.setDate(ovulation.getDate()+1)

let nextPeriod=new Date(cycle)
nextPeriod.setDate(cycle.getDate()+length)

document.getElementById("ovulation").innerHTML=ovulation.toDateString()

document.getElementById("fertile").innerHTML=
fertileStart.toDateString()+" - "+fertileEnd.toDateString()

document.getElementById("next").innerHTML=nextPeriod.toDateString()

}

</script><script src="../js/main.js"></script><script type="application/ld+json">
