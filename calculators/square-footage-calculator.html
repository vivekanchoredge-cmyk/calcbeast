<h1>Square Footage Calculator</h1><p>Calculate the area of a room or space.</p><label>Length (ft)</label>
<br/>
<input id="length" type="number"/>
<br/><br/>
<label>Width (ft)</label>
<br/>
<input id="width" type="number"/>
<br/><br/>
<button onclick="area()">Calculate Area</button>
<br/><br/>
<div id="result"></div><ul><li><strong>Area (sq ft):</strong> <span id="sqft"></span></li><li><strong>Area (sq meter):</strong> <span id="sqm"></span></li><li><strong>Area (sq yard):</strong> <span id="sqyard"></span></li></ul><table><tr>
<th>Length</th>
<th>Width</th>
<th>Area</th>
</tr><tbody id="table"></tbody></table><script>

function area(){

let length=parseFloat(document.getElementById("length").value)

let width=parseFloat(document.getElementById("width").value)

let sqft=length*width

let sqm=sqft*0.092903

let sqyard=sqft/9

document.getElementById("sqft").innerHTML=sqft.toFixed(2)

document.getElementById("sqm").innerHTML=sqm.toFixed(2)

document.getElementById("sqyard").innerHTML=sqyard.toFixed(2)

document.getElementById("result").innerHTML=
"Room area is "+sqft.toFixed(2)+" square feet"

let table="<tr><td>"+length+" ft</td><td>"+width+" ft</td><td>"+sqft.toFixed(2)+" sq ft</td></tr>"

document.getElementById("table").innerHTML=table

}
