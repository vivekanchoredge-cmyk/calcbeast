<h1>Percentage Calculator</h1><p>Calculate percentage using different methods.</p><h2>1. Percentage of a Number</h2><label>Total Number</label>
<br/>
<input id="total" type="number"/>
<br/><br/>
<label>Percentage (%)</label>
<br/>
<input id="percent" type="number"/>
<br/><br/>
<button onclick="calcPercent()">Calculate</button>
<p id="result1"></p><hr/><h2>2. Percentage Increase / Decrease</h2><label>Old Value</label>
<br/>
<input id="old" type="number"/>
<br/><br/>
<label>New Value</label>
<br/>
<input id="new" type="number"/>
<br/><br/>
<button onclick="calcChange()">Calculate Change</button>
<p id="result2"></p><hr/><h2>3. What Percent is X of Y</h2><label>Part</label>
<br/>
<input id="part" type="number"/>
<br/><br/>
<label>Total</label>
<br/>
<input id="whole" type="number"/>
<br/><br/>
<button onclick="calcOf()">Calculate</button>
<p id="result3"></p><script>

function calcPercent(){

let total=document.getElementById("total").value

let percent=document.getElementById("percent").value

let result=(total*percent)/100

document.getElementById("result1").innerHTML="Result: "+result

}


function calcChange(){

let old=document.getElementById("old").value

let newv=document.getElementById("new").value

let change=((newv-old)/old)*100

document.getElementById("result2").innerHTML="Change: "+change.toFixed(2)+"%"

}


function calcOf(){

let part=document.getElementById("part").value

let whole=document.getElementById("whole").value

let percent=(part/whole)*100

document.getElementById("result3").innerHTML="Percentage: "+percent.toFixed(2)+"%"

}
