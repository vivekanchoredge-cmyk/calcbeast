<h1>Advanced Mortgage Calculator</h1><p>Estimate monthly mortgage payment and loan details.</p><label>Loan Amount</label>
<br/>
<input id="loan" placeholder="Loan Amount" type="number"/>
<br/><br/>
<label>Interest Rate (%)</label>
<br/>
<input id="rate" placeholder="Interest Rate" type="number"/>
<br/><br/>
<label>Loan Duration (Years)</label>
<br/>
<input id="years" placeholder="Years" type="number"/>
<br/><br/>
<button onclick="calculateMortgage()">Calculate</button>
<br/><br/>
<h2>Loan Summary</h2><ul><li><strong>Monthly Payment:</strong> <span id="monthly"></span></li><li><strong>Total Interest:</strong> <span id="interest"></span></li><li><strong>Total Payment:</strong> <span id="total"></span></li></ul><script>

function calculateMortgage(){

let loan=document.getElementById("loan").value;

let rate=document.getElementById("rate").value/100/12;

let months=document.getElementById("years").value*12;

let payment=(loan*rate*Math.pow(1+rate,months))/(Math.pow(1+rate,months)-1);

let totalPayment=payment*months;

let totalInterest=totalPayment-loan;

document.getElementById("monthly").innerHTML=payment.toFixed(2);

document.getElementById("interest").innerHTML=totalInterest.toFixed(2);

document.getElementById("total").innerHTML=totalPayment.toFixed(2);

}

</script><script src="../js/main.js"></script>
